app = 'clash-of-prompt-full'
primary_region = 'sin'

[build]
  image = "registry.fly.io/clash-of-prompt-full:latest"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/health"
    interval = "30s"
    timeout = "10s"
    grace_period = "120s"

[env]
  PORT = "8080"

[mounts]
  source = "minitia_data"
  destination = "/data/minitia"
  initial_size = "2"

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
